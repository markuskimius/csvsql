<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSVSQL - CSV Database</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div id="menubar">
    <div class="menu-item" id="menu-file">
      <span class="menu-label">File</span>
      <div class="menu-dropdown">
        <button onclick="app.openFile()">Open...<span class="shortcut">Ctrl+O</span></button>
        <button onclick="app.openURL()">Open URL...</button>
        <button id="btn-save" disabled>Save Table<span class="shortcut">Ctrl+S</span></button>
        <button id="btn-save-as" disabled>Save Table As...</button>
        <hr>
        <button onclick="app.newTable()">New Table<span class="shortcut">Ctrl+N</span></button>
        <button id="btn-close-window" disabled>Close Window<span class="shortcut">Ctrl+W</span></button>
      </div>
    </div>
    <div class="menu-item" id="menu-view">
      <span class="menu-label">View</span>
      <div class="menu-dropdown">
        <button id="btn-tile-h" disabled>Tile Horizontally</button>
        <button id="btn-tile-v" disabled>Tile Vertically</button>
        <button id="btn-grid" disabled>Grid</button>
        <button id="btn-cascade" disabled>Cascade</button>
        <hr>
        <button id="btn-minimize-all" disabled>Minimize All</button>
        <button id="btn-restore-all" disabled>Restore All</button>
      </div>
    </div>
    <div class="menu-item" id="menu-windows">
      <span class="menu-label">Windows</span>
      <div class="menu-dropdown" id="windows-list">
      </div>
    </div>
    <div class="menu-item" id="menu-help">
      <span class="menu-label">Help</span>
      <div class="menu-dropdown">
        <button onclick="app.showManual()">User's Manual</button>
        <hr>
        <button onclick="app.showAbout()">About CSVSQL</button>
      </div>
    </div>
  </div>

  <div id="workspace">
    <div id="window-area"></div>
  </div>

  <div id="console-panel">
    <div id="console-resize-handle"></div>
    <div id="console-header">
      <div id="console-tabs">
        <button class="console-tab active" data-tab="sql">SQL</button>
        <button class="console-tab" data-tab="ai">AI <span style="font-size:9px;opacity:0.6;">(experimental)</span></button>
      </div>
      <div id="console-actions">
        <button onclick="app.runConsole()" title="Execute (Ctrl+Enter)">Run</button>
        <button onclick="app.clearConsole()" title="Clear">Clear</button>
      </div>
    </div>
    <div id="console-body">
      <textarea id="sql-input" placeholder="SELECT * FROM tablename WHERE ..." spellcheck="false"></textarea>
    </div>
    <div id="ai-body" style="display:none">
      <div id="ai-controls">
        <label for="ai-table-select" id="ai-table-label">Tables:</label>
        <select id="ai-table-select" multiple title="Select tables to include in analysis (all included by default)"></select>
        <button id="ai-settings-btn" title="AI Settings">&#9881;</button>
        <span id="ai-provider-badge"></span>
      </div>
      <div id="ai-response"></div>
      <div id="ai-input-row">
        <textarea id="ai-input" placeholder="Ask about your data..." spellcheck="false" rows="2"></textarea>
        <button id="ai-send-btn" onclick="app.runConsole()" title="Send (Ctrl+Enter)">&#9654;</button>
      </div>
    </div>
    <div id="console-status"></div>
  </div>

  <input type="file" id="file-input" accept=".csv,.tsv,.psv,.txt,.xlsx,.xls,.gz,.zip,.bz2,.xz,.rar,.7z,.zst" multiple style="display:none">
  <div id="drop-overlay">Drop files here</div>
  <script src="app.js"></script>
</body>
</html>
